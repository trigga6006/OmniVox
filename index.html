<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniVox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Overlay windows: make html+body transparent BEFORE any CSS/JS loads
         so WebView2 never flashes a grey/white background. -->
    <script>
      // Apply cached theme before CSS loads to prevent flash
      try {
        var t = localStorage.getItem('omnivox-theme');
        if (t) document.documentElement.dataset.theme = t;
      } catch(e) {}
      // Overlay windows: transparent background
      if (window.__TAURI_INTERNALS__) {
        try {
          var label = window.__TAURI_INTERNALS__.metadata.currentWindow.label;
          if (label === 'overlay') {
            document.documentElement.classList.add('overlay-window');
            document.documentElement.style.background = 'transparent';
          }
        } catch(e) {}
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
