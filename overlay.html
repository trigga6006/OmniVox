<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniVox Overlay</title>
    <!--
      Google Fonts — required for the premium pill + panel typography.
      Archivo powers display kickers ("STRUCTURED", "CONTEXT MODE", etc.);
      Outfit is the body face; IBM Plex Mono renders kbd hints and inline code.
      Weight set trimmed to what the overlay actually uses.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Outfit:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Force overlay transparent background before any CSS loads
      document.documentElement.classList.add('overlay-window');
      document.documentElement.style.background = 'transparent';
      document.documentElement.dataset.theme = 'dark';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay-main.tsx"></script>
  </body>
</html>
