name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Short absolute target dir to avoid Windows 260-char MAX_PATH errors.
  # MSBuild FileTracker ignores the long-path registry setting, and
  # whisper-rs-sys's Vulkan shader build creates deeply nested paths.
  CARGO_TARGET_DIR: C:\b
  # Force Ninja instead of Visual Studio / MSBuild.  MSBuild in parallel
  # mode races on llama-cpp-sys-2's `vulkan-shaders-gen` subproject —
  # the install step gets scheduled before the build step completes and
  # fails with "Not a file: .../cmake_install.cmake".  Ninja handles the
  # inter-target dependency correctly AND is meaningfully faster.
  # Local dev (scripts/start-release-dev.ps1) already sets this.
  CMAKE_GENERATOR: Ninja

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Ninja drives `cl.exe` / `link.exe` directly instead of going
      # through MSBuild, so the MSVC toolchain paths need to be on PATH
      # and the usual VS env vars (INCLUDE, LIB, LIBPATH) exported.
      # `ilammy/msvc-dev-cmd` runs `vcvarsall.bat x64` and persists the
      # result to $GITHUB_ENV for subsequent steps.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.309.0
          install_runtime: true
          cache: true
          stripdown: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        shell: bash
        run: cargo tauri build --features vulkan

      - name: Package release assets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # NSIS installer is in the short target dir
          INSTALLER=$(find /c/b/release/bundle/nsis -name "*.exe" 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No NSIS installer found. Searching all bundle output:"
            find /c/b -path "*/bundle/nsis/*.exe" 2>/dev/null
            exit 1
          fi
          echo "Found installer: $INSTALLER"
          INSTALLER_NAME="OmniVox-${VERSION}-x86_64-windows-setup.exe"
          cp "$INSTALLER" "$INSTALLER_NAME"
          echo "INSTALLER_NAME=$INSTALLER_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OmniVox ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.INSTALLER_NAME }}
