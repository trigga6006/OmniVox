name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Short absolute target dir to avoid Windows 260-char MAX_PATH errors.
  # MSBuild FileTracker ignores the long-path registry setting, and
  # whisper-rs-sys's Vulkan shader build creates deeply nested paths.
  CARGO_TARGET_DIR: C:\b

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.309.0
          install_runtime: true
          cache: true
          stripdown: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build LLM sidecar
        shell: bash
        run: |
          cd src-tauri/llm-sidecar
          cargo build --release
          # Copy sidecar exe + DLLs next to where Tauri will package them
          cp /c/b/release/omnivox-llm.exe ../resources/
          cp /c/b/release/llama.dll ../resources/
          cp /c/b/release/ggml.dll ../resources/
          cp /c/b/release/ggml-base.dll ../resources/
          cp /c/b/release/ggml-cpu.dll ../resources/

      - name: Build Tauri app
        shell: bash
        run: cargo tauri build --features vulkan

      - name: Package release assets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # NSIS installer is in the short target dir
          INSTALLER=$(find /c/b/release/bundle/nsis -name "*.exe" 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No NSIS installer found. Searching all bundle output:"
            find /c/b -path "*/bundle/nsis/*.exe" 2>/dev/null
            exit 1
          fi
          echo "Found installer: $INSTALLER"
          INSTALLER_NAME="OmniVox-${VERSION}-x86_64-windows-setup.exe"
          cp "$INSTALLER" "$INSTALLER_NAME"
          echo "INSTALLER_NAME=$INSTALLER_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OmniVox ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.INSTALLER_NAME }}
